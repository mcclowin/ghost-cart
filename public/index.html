<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GhostCart — Shop Privately</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0a0a0a; color: #e0e0e0; min-height: 100vh;
    }
    .container { max-width: 860px; margin: 0 auto; padding: 20px; }
    
    .header { text-align: center; padding: 40px 0 30px; }
    .header h1 { font-size: 2.5em; margin-bottom: 8px; }
    .header p { color: #888; font-size: 1.1em; }
    .privacy-badge {
      display: inline-block; margin-top: 12px; padding: 6px 16px;
      background: #1a1a2e; border: 1px solid #2a2a4a; border-radius: 20px;
      font-size: 0.85em; color: #7b68ee;
    }

    .search-box { display: flex; gap: 10px; margin: 30px 0; }
    .search-box input {
      flex: 1; padding: 14px 18px; border-radius: 12px;
      border: 1px solid #333; background: #141414; color: #fff;
      font-size: 1em; outline: none;
    }
    .search-box input:focus { border-color: #7b68ee; }
    .search-box button {
      padding: 14px 28px; border-radius: 12px; border: none;
      background: #7b68ee; color: white; font-size: 1em;
      cursor: pointer; font-weight: 600; white-space: nowrap;
    }
    .search-box button:hover { background: #6a56d6; }
    .search-box button:disabled { opacity: 0.5; cursor: not-allowed; }

    .status { text-align: center; padding: 20px; color: #888; }
    .status.searching { color: #7b68ee; }
    .spinner { animation: spin 1s linear infinite; display: inline-block; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .results { margin-top: 20px; }

    .result-card {
      background: #141414; border: 1px solid #222; border-radius: 12px;
      padding: 16px; margin-bottom: 12px;
      display: flex; gap: 16px; align-items: flex-start;
      transition: border-color 0.2s;
    }
    .result-card:hover { border-color: #7b68ee; }
    .result-card.best { border-color: #4ade80; background: #0a1a0a; }

    .result-rank {
      font-size: 1.4em; font-weight: 700; color: #555;
      min-width: 36px; text-align: center; padding-top: 10px;
    }
    .result-card.best .result-rank { color: #4ade80; }

    .result-img-container {
      width: 100px; min-width: 100px; height: 100px;
      border-radius: 8px; overflow: hidden; background: #222;
      display: flex; align-items: center; justify-content: center;
    }
    .result-img {
      width: 100%; height: 100%; object-fit: contain;
    }
    .result-img-placeholder {
      color: #444; font-size: 2em;
    }

    .result-info { flex: 1; min-width: 0; }
    .result-title {
      font-weight: 600; margin-bottom: 4px;
      display: -webkit-box; -webkit-line-clamp: 2;
      -webkit-box-orient: vertical; overflow: hidden;
    }
    .result-store {
      color: #888; font-size: 0.85em; margin-bottom: 6px;
    }
    .result-store a { color: #7b68ee; text-decoration: none; }
    .result-store a:hover { text-decoration: underline; }

    .scores { display: flex; gap: 6px; margin-bottom: 8px; flex-wrap: wrap; }
    .score-badge {
      font-size: 0.7em; padding: 2px 8px; border-radius: 10px;
      background: #1a1a2e; color: #7b68ee;
    }
    .score-badge.high { background: #0a2e0a; color: #4ade80; }
    .score-badge.low { background: #2e1a1a; color: #ee6868; }
    .score-badge.warn { background: #2e2a1a; color: #eeb868; }

    .result-recommendation {
      font-size: 0.8em; color: #aaa; font-style: italic;
      margin-bottom: 6px;
    }

    .result-actions { display: flex; gap: 8px; }
    .btn-view {
      padding: 7px 14px; border-radius: 8px; border: 1px solid #444;
      background: transparent; color: #ccc; cursor: pointer;
      font-size: 0.8em; text-decoration: none; display: inline-block;
    }
    .btn-view:hover { border-color: #7b68ee; color: #7b68ee; }
    .btn-buy {
      padding: 7px 14px; border-radius: 8px; border: none;
      background: #4ade80; color: #000; font-weight: 600;
      cursor: pointer; font-size: 0.8em;
    }
    .btn-buy:hover { background: #3bce70; }

    .result-price { 
      font-size: 1.3em; font-weight: 700; color: #4ade80;
      text-align: right; min-width: 90px; padding-top: 10px;
    }

    .best-pick {
      background: #0a1a0a; border: 1px solid #4ade80; border-radius: 12px;
      padding: 16px; margin-top: 20px; text-align: center;
    }
    .best-pick h3 { color: #4ade80; margin-bottom: 8px; }

    .filtered-info {
      margin-top: 16px; padding: 12px; background: #1a1a1a;
      border-radius: 8px; font-size: 0.8em; color: #666;
    }
    .filtered-info summary { cursor: pointer; color: #888; }

    .meta-bar {
      display: flex; justify-content: space-between; align-items: center;
      margin-top: 12px; font-size: 0.8em; color: #555;
    }

    .privacy-footer {
      text-align: center; padding: 30px 0; color: #555;
      font-size: 0.85em; border-top: 1px solid #1a1a1a; margin-top: 40px;
    }
    .privacy-footer a { color: #7b68ee; text-decoration: none; }

    .modal-overlay {
      display: none; position: fixed; top: 0; left: 0;
      width: 100%; height: 100%; background: rgba(0,0,0,0.8);
      z-index: 1000; justify-content: center; align-items: center;
    }
    .modal-overlay.active { display: flex; }
    .modal {
      background: #1a1a1a; border: 1px solid #333; border-radius: 16px;
      padding: 30px; max-width: 400px; width: 90%;
    }
    .modal h3 { margin-bottom: 16px; }
    .payment-options { display: flex; flex-direction: column; gap: 10px; }
    .payment-btn {
      padding: 14px; border-radius: 10px; border: 1px solid #333;
      background: #222; color: #fff; cursor: pointer; font-size: 1em;
    }
    .payment-btn:hover { border-color: #7b68ee; }
    .buy-status {
      margin-top: 14px; font-size: 0.85em; color: #aaa; line-height: 1.5;
    }
    .buy-status a { color: #7b68ee; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>🛒👻 GhostCart</h1>
      <p>Shop the internet. Privately.</p>
      <div class="privacy-badge">🔒 Powered by Venice AI — zero data retention</div>
    </div>

    <div class="search-box">
      <input type="text" id="searchInput" placeholder="What are you looking for? e.g. 'mustard puffy jacket women's size M'" />
      <button id="searchBtn">Search</button>
    </div>

    <div id="status" class="status"></div>
    <div id="results" class="results"></div>
    <div id="bestPick"></div>
    <div id="filtered"></div>
    <div id="metaBar"></div>

    <div class="privacy-footer">
      🔒 Your search queries are never stored or used for training.<br>
      Stores see GhostCart, not you. 
      <a href="/skill.md">Agent API</a> · <a href="/.well-known/agent-card.json">ERC-8004</a>
    </div>
  </div>

  <div class="modal-overlay" id="paymentModal">
    <div class="modal">
      <h3>How would you like to pay?</h3>
      <div id="buyItemDetails" style="margin-bottom:16px; color:#aaa;"></div>
      <div class="payment-options">
        <button class="payment-btn" style="border-color:#635bff" id="btnCard">💳 Pay with Card</button>
        <button class="payment-btn" style="border-color:#2775ca" id="btnUSDC">🔵 Pay with USDC (Base)</button>
        <button class="payment-btn" id="btnCancel">Cancel</button>
      </div>
      <div id="buyStatus" class="buy-status"></div>
    </div>
  </div>

  <script>
    let currentData = null;
    let currentBuyIndex = null;
    let currentBuyTaskId = null;
    let currentBuyPollTimer = null;
    let currentBuyCheckpointHistory = [];
    let currentBuyLatestStepCount = -1;
    let currentBuyTerminalSeen = false;

    function formatPrice(price) {
      if (!price) return '—';
      if (typeof price === 'string') return price;
      if (typeof price === 'object') return price.display || `£${price.amount}` || '—';
      if (typeof price === 'number') return `£${price.toFixed(2)}`;
      return '—';
    }

    // Wire up events
    document.getElementById('searchBtn').addEventListener('click', doSearch);
    document.getElementById('searchInput').addEventListener('keydown', e => {
      if (e.key === 'Enter') doSearch();
    });
    document.getElementById('btnCard').addEventListener('click', () => startGhostCartBuy('card'));
    document.getElementById('btnUSDC').addEventListener('click', () => startGhostCartBuy('usdc'));
    document.getElementById('btnCancel').addEventListener('click', closeModal);

    async function doSearch() {
      const query = document.getElementById('searchInput').value.trim();
      if (!query) return;

      const btn = document.getElementById('searchBtn');
      const status = document.getElementById('status');

      btn.disabled = true;
      btn.textContent = 'Searching...';
      document.getElementById('results').innerHTML = '';
      document.getElementById('bestPick').innerHTML = '';
      document.getElementById('filtered').innerHTML = '';
      document.getElementById('metaBar').innerHTML = '';
      
      status.className = 'status searching';
      status.innerHTML = '<span class="spinner">🔍</span> Searching privately across stores...';

      try {
        const res = await fetch('/api/search', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ query }),
        });

        const data = await res.json();
        currentData = data;

        if (data.error) {
          status.innerHTML = '❌ ' + data.message;
          status.className = 'status';
        } else if (data.results?.results?.length > 0) {
          const validCount = data.results.results.length;
          const totalFound = data.resultCount || validCount;
          status.innerHTML = `✅ ${validCount} verified products found (${totalFound} raw results scanned)`;
          status.className = 'status';
          renderResults(data.results);
          renderMeta(data);
        } else {
          status.innerHTML = 'No matching products found. Try different search terms.';
          status.className = 'status';
        }
      } catch (err) {
        status.innerHTML = '❌ Search failed: ' + err.message;
        status.className = 'status';
      }

      btn.disabled = false;
      btn.textContent = 'Search';
    }

    function scoreClass(score) {
      if (score >= 75) return 'high';
      if (score <= 40) return 'low';
      return '';
    }

    function renderResults(ranked) {
      const container = document.getElementById('results');
      
      ranked.results.forEach((item, i) => {
        const isBest = i === 0;
        const card = document.createElement('div');
        card.className = `result-card${isBest ? ' best' : ''}`;
        
        const imgHtml = item.image 
          ? `<img class="result-img" src="${item.image}" alt="${item.title || ''}" onerror="this.parentElement.innerHTML='<div class=result-img-placeholder>📦</div>'" />`
          : '<div class="result-img-placeholder">📦</div>';

        const warningsHtml = (item.warnings || [])
          .filter(w => w)
          .map(w => `<span class="score-badge warn">⚠️ ${w}</span>`)
          .join('');

        card.innerHTML = `
          <div class="result-rank">${isBest ? '🏆' : '#' + (item.rank || i + 1)}</div>
          <div class="result-img-container">${imgHtml}</div>
          <div class="result-info">
            <div class="result-title">${item.title || 'Unknown product'}</div>
            <div class="result-store">
              ${item.marketplace || 'Unknown store'}
              ${item.url ? ` · <a href="${item.url}" target="_blank" rel="noopener">View on store ↗</a>` : ''}
            </div>
            <div class="scores">
              <span class="score-badge ${scoreClass(item.relevanceScore)}">Match: ${item.relevanceScore || '?'}%</span>
              <span class="score-badge ${scoreClass(item.valueScore)}">Value: ${item.valueScore || '?'}%</span>
              <span class="score-badge ${scoreClass(item.trustScore)}">Trust: ${item.trustScore || '?'}%</span>
              ${warningsHtml}
            </div>
            ${item.recommendation ? `<div class="result-recommendation">"${item.recommendation}"</div>` : ''}
            <div class="result-actions">
              ${item.url ? `<a class="btn-view" href="${item.url}" target="_blank" rel="noopener">Buy direct ↗</a>` : ''}
              <button class="btn-buy" data-index="${i}">GhostCart buy 🛒</button>
            </div>
          </div>
          <div class="result-price">${formatPrice(item.price)}</div>
        `;

        // Wire up buy button
        card.querySelector('.btn-buy').addEventListener('click', () => buyItem(i));
        container.appendChild(card);
      });

      if (ranked.bestPick) {
        document.getElementById('bestPick').innerHTML = `
          <div class="best-pick">
            <h3>🏆 Best Pick</h3>
            <p>${ranked.bestPick}</p>
          </div>
        `;
      }

      // Show filtered results
      if (ranked.filtered?.length > 0) {
        document.getElementById('filtered').innerHTML = `
          <div class="filtered-info">
            <details>
              <summary>${ranked.filtered.length} irrelevant results filtered out</summary>
              <ul style="margin-top:8px;padding-left:20px;">
                ${ranked.filtered.map(f => `<li>${f}</li>`).join('')}
              </ul>
            </details>
          </div>
        `;
      }
    }

    function renderMeta(data) {
      const sources = data.sources || {};
      const parts = [];
      if (sources.googleShopping) parts.push(`Google Shopping: ${sources.googleShopping}`);
      if (sources.resolvedUrls != null) parts.push(`Resolved URLs: ${sources.resolvedUrls}`);
      if (sources.validatedUrls != null) parts.push(`Validated URLs: ${sources.validatedUrls}`);
      if (data.duration) parts.push(`${(data.duration / 1000).toFixed(1)}s`);

      document.getElementById('metaBar').innerHTML = `
        <div class="meta-bar">
          <span>Sources: ${parts.join(' · ')}</span>
          <span>🔒 ${data.privacy || 'Processed privately'}</span>
        </div>
      `;
    }

    function buyItem(index) {
      const item = currentData?.results?.results?.[index];
      currentBuyIndex = index;
      currentBuyTaskId = null;
      currentBuyCheckpointHistory = [];
      currentBuyLatestStepCount = -1;
      currentBuyTerminalSeen = false;
      if (currentBuyPollTimer) clearTimeout(currentBuyPollTimer);
      if (item) {
        document.getElementById('buyItemDetails').innerHTML = 
          `<strong>${item.title}</strong><br>${item.price} from ${item.marketplace}`;
      }
      document.getElementById('buyStatus').innerHTML = 'GhostCart will try to add this item to cart and reach the checkout page without submitting payment.';
      document.getElementById('paymentModal').classList.add('active');
    }

    function setBuyButtonsDisabled(disabled) {
      document.getElementById('btnCard').disabled = disabled;
      document.getElementById('btnUSDC').disabled = disabled;
    }

    function isTerminalBuyStatus(status) {
      const value = String(status || '').toUpperCase();
      return value.includes('COMPLETE')
        || value.includes('SUCCESS')
        || value.includes('FAILED')
        || value.includes('ERROR')
        || value.includes('CANCEL')
        || value.includes('STOP');
    }

    async function startGhostCartBuy(paymentMethod) {
      const item = currentData?.results?.results?.[currentBuyIndex];
      if (!item) return;

      setBuyButtonsDisabled(true);
      document.getElementById('buyStatus').innerHTML = 'Starting GhostCart checkout automation...';

      try {
        const res = await fetch('/api/buy', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            url: item.url,
            title: item.title,
            price: item.price,
            marketplace: item.marketplace,
            paymentMethod,
          }),
        });

        const data = await res.json();
        if (data.error) {
          if (data.error === 'locus_insufficient_balance') {
            const parts = [
              data.message || 'Locus wallet is not funded yet.',
              data.requiredAmount ? `Required for this task: ${data.requiredAmount} USDC` : null,
              data.walletBalance != null ? `Current wallet balance: ${data.walletBalance} USDC` : null,
              data.nextStep || 'Request beta credits or fund the wallet, then try again.',
            ].filter(Boolean);
            document.getElementById('buyStatus').innerHTML = parts.join('<br>');
          } else {
            document.getElementById('buyStatus').textContent = `Error: ${data.message || data.error}`;
          }
          return;
        }

        currentBuyTaskId = data.taskId || null;

        if (data.approvalUrl) {
          document.getElementById('buyStatus').innerHTML = `
            ${data.message || 'Approval required before checkout automation can start.'}<br>
            <a href="${data.approvalUrl}" target="_blank" rel="noopener">Approve in Locus ↗</a>
          `;
        } else {
          document.getElementById('buyStatus').textContent = data.message || 'Checkout automation started.';
        }

        if (currentBuyTaskId) {
          pollBuyTask(currentBuyTaskId);
        }
      } catch (err) {
        document.getElementById('buyStatus').textContent = `Error: ${err.message}`;
      } finally {
        setBuyButtonsDisabled(false);
      }
    }

    function renderBuyStatus(data) {
      const parts = [`Status: ${data.status || 'UNKNOWN'}`];
      if (data.stage) parts.push(`Stage: ${data.stage}`);
      if (data.stepCount != null) parts.push(`Steps: ${data.stepCount}`);
      if (data.pageUrl) parts.push(`Page: ${data.pageUrl}`);
      if (data.summary) parts.push(`Summary: ${data.summary}`);
      if (data.lastAction) parts.push(`Last action: ${data.lastAction}`);
      if (Array.isArray(data.paymentOptions) && data.paymentOptions.length > 0) {
        parts.push(`Payment options: ${data.paymentOptions.join(', ')}`);
      }
      if (Array.isArray(data.blockers) && data.blockers.length > 0) {
        parts.push(`Blockers: ${data.blockers.join(', ')}`);
      }
      if (data.requiresUserInput) {
        parts.push('User input required before checkout can continue.');
      }
      if (data.screenshotUrl) {
        parts.push(`<a href="${data.screenshotUrl}" target="_blank" rel="noopener">Latest screenshot ↗</a>`);
      }

      const checkpointKey = [data.status, data.stage, data.stepCount, data.summary, data.pageUrl].join('|');
      if (checkpointKey && !currentBuyCheckpointHistory.some(entry => entry.key === checkpointKey)) {
        currentBuyCheckpointHistory.push({
          key: checkpointKey,
          label: `${data.status || 'UNKNOWN'}${data.stage ? ` / ${data.stage}` : ''}`,
          detail: data.summary || data.lastAction || data.pageUrl || 'Checkpoint recorded',
        });
      }

      const historyHtml = currentBuyCheckpointHistory.length > 0
        ? `<div style="margin-top:12px"><strong>Checkpoints</strong><ol style="margin:8px 0 0 18px;padding:0;">${
            currentBuyCheckpointHistory.map(entry => `<li>${entry.label}: ${entry.detail}</li>`).join('')
          }</ol></div>`
        : '';

      document.getElementById('buyStatus').innerHTML = `${parts.join('<br>')}${historyHtml}`;
    }

    async function pollBuyTask(taskId) {
      try {
        const res = await fetch(`/api/buy/${taskId}`);
        const data = await res.json();
        if (data.error) {
          document.getElementById('buyStatus').textContent = `Status error: ${data.message || data.error}`;
          return;
        }

        const stepCount = Number(data.stepCount ?? -1);
        const incomingTerminal = isTerminalBuyStatus(data.status);

        if (currentBuyTerminalSeen && !incomingTerminal) {
          return;
        }
        if (stepCount >= 0 && stepCount < currentBuyLatestStepCount && !incomingTerminal) {
          return;
        }

        currentBuyLatestStepCount = Math.max(currentBuyLatestStepCount, stepCount);
        if (incomingTerminal) {
          currentBuyTerminalSeen = true;
        }

        renderBuyStatus(data);

        if (!incomingTerminal) {
          currentBuyPollTimer = setTimeout(() => pollBuyTask(taskId), 3000);
        }
      } catch (err) {
        document.getElementById('buyStatus').textContent = `Status error: ${err.message}`;
      }
    }

    function closeModal() {
      if (currentBuyPollTimer) clearTimeout(currentBuyPollTimer);
      document.getElementById('paymentModal').classList.remove('active');
    }
  </script>
</body>
</html>
